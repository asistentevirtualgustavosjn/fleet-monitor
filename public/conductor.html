<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>GPS Conductor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, sans-serif; background: #0f172a; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
  .card { background: #1e293b; border-radius: 20px; padding: 32px 24px; width: 100%; max-width: 360px; text-align: center; }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
  .sub { font-size: 14px; color: #94a3b8; margin-bottom: 32px; }
  .status-circle { width: 100px; height: 100px; border-radius: 50%; margin: 0 auto 24px; display: flex; align-items: center; justify-content: center; font-size: 36px; background: #334155; transition: background .4s; }
  .status-circle.activo { background: #15803d; animation: pulso 2s infinite; }
  .status-circle.error { background: #991b1b; }
  @keyframes pulso { 0%,100%{box-shadow:0 0 0 0 rgba(21,128,61,.5)} 50%{box-shadow:0 0 0 16px rgba(21,128,61,0)} }
  .status-text { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
  .status-detail { font-size: 13px; color: #94a3b8; margin-bottom: 28px; min-height: 20px; }
  .coords { background: #0f172a; border-radius: 12px; padding: 14px; margin-bottom: 24px; font-size: 13px; color: #64748b; line-height: 1.8; }
  .coords span { color: #e2e8f0; font-weight: 500; font-variant-numeric: tabular-nums; }
  .btn { width: 100%; padding: 16px; border-radius: 14px; border: none; font-size: 17px; font-weight: 600; cursor: pointer; transition: all .2s; }
  .btn-start { background: #16a34a; color: #fff; }
  .btn-start:active { background: #15803d; transform: scale(.98); }
  .btn-stop { background: #dc2626; color: #fff; }
  .btn-stop:active { background: #b91c1c; transform: scale(.98); }
  .vehiculo-sel { margin-bottom: 24px; }
  .vehiculo-sel label { font-size: 13px; color: #94a3b8; display: block; margin-bottom: 8px; }
  .vehiculo-sel select { width: 100%; padding: 12px; border-radius: 10px; background: #0f172a; color: #fff; border: 1px solid #334155; font-size: 15px; }
  .contador { font-size: 12px; color: #475569; margin-top: 16px; }
</style>
</head>
<body>
<div class="card">
  <h1>GPS Conductor</h1>
  <p class="sub">Sistema de monitoreo de flota</p>

  <div class="vehiculo-sel">
    <label>Selecciona tu vehículo</label>
    <select id="vehiculo">
      <option value="VH-001">Camión 1</option>
      <option value="VH-002">Camión 2</option>
    </select>
  </div>

  <div class="status-circle" id="circulo">📍</div>
  <div class="status-text" id="statusText">Listo para iniciar</div>
  <div class="status-detail" id="statusDetail">Presiona el botón para comenzar</div>

  <div class="coords">
    Latitud: <span id="lat">--</span><br>
    Longitud: <span id="lng">--</span><br>
    Velocidad: <span id="spd">--</span> km/h<br>
    Última envío: <span id="hora">--</span>
  </div>

  <button class="btn btn-start" id="btnAccion" onclick="toggleGPS()">
    Iniciar seguimiento
  </button>
  <div class="contador" id="contador"></div>
</div>

<script>
let activo = false;
let intervalo = null;
let enviados = 0;
const SERVER = window.location.origin;

function toggleGPS() {
  if (!activo) iniciar();
  else detener();
}

function iniciar() {
  if (!navigator.geolocation) {
    mostrarError('Tu celular no tiene GPS disponible');
    return;
  }
  activo = true;
  enviados = 0;
  document.getElementById('btnAccion').textContent = 'Detener seguimiento';
  document.getElementById('btnAccion').className = 'btn btn-stop';
  document.getElementById('statusText').textContent = 'Obteniendo GPS...';
  document.getElementById('statusDetail').textContent = 'Buscando señal GPS';
  document.getElementById('circulo').className = 'status-circle';
  document.getElementById('circulo').textContent = '🔍';
  document.getElementById('vehiculo').disabled = true;
  enviarUbicacion();
  intervalo = setInterval(enviarUbicacion, 5000);
}

function detener() {
  activo = false;
  clearInterval(intervalo);
  intervalo = null;
  document.getElementById('btnAccion').textContent = 'Iniciar seguimiento';
  document.getElementById('btnAccion').className = 'btn btn-start';
  document.getElementById('statusText').textContent = 'Seguimiento detenido';
  document.getElementById('statusDetail').textContent = 'Presiona el botón para comenzar';
  document.getElementById('circulo').className = 'status-circle';
  document.getElementById('circulo').textContent = '📍';
  document.getElementById('vehiculo').disabled = false;
  document.getElementById('contador').textContent = '';
}

function enviarUbicacion() {
  navigator.geolocation.getCurrentPosition(
    pos => {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      const speed = pos.coords.speed ? Math.round(pos.coords.speed * 3.6) : 0;
      const vehicleId = document.getElementById('vehiculo').value;

      document.getElementById('lat').textContent = lat.toFixed(6);
      document.getElementById('lng').textContent = lng.toFixed(6);
      document.getElementById('spd').textContent = speed;
      document.getElementById('hora').textContent = new Date().toLocaleTimeString('es-PY');

      fetch(`${SERVER}/gps`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ vehicleId, lat, lng, speed })
      })
      .then(r => r.json())
      .then(() => {
        enviados++;
        document.getElementById('circulo').className = 'status-circle activo';
        document.getElementById('circulo').textContent = '✅';
        document.getElementById('statusText').textContent = 'Enviando en vivo';
        document.getElementById('statusDetail').textContent = 'Tu ubicación se actualiza cada 5 seg';
        document.getElementById('contador').textContent = `${enviados} actualizaciones enviadas`;
      })
      .catch(() => mostrarError('Sin conexión al servidor'));
    },
    err => {
      let msg = 'Error de GPS';
      if (err.code === 1) msg = 'Debes permitir acceso a la ubicación';
      if (err.code === 2) msg = 'GPS no disponible, sal a un área abierta';
      if (err.code === 3) msg = 'GPS tardó mucho, reintentando...';
      mostrarError(msg);
    },
    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
  );
}

function mostrarError(msg) {
  document.getElementById('circulo').className = 'status-circle error';
  document.getElementById('circulo').textContent = '⚠️';
  document.getElementById('statusText').textContent = 'Error';
  document.getElementById('statusDetail').textContent = msg;
}
</script>
</body>
</html>
